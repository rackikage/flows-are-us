<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Instagram rainbow, diagonal bottom-left → top-right -->
    <linearGradient id="ig" x1="72" y1="440" x2="440" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#feda75"/>
      <stop offset="0.25" stop-color="#fa7e1e"/>
      <stop offset="0.5" stop-color="#d62976"/>
      <stop offset="0.75" stop-color="#962fbf"/>
      <stop offset="1" stop-color="#4f5bd5"/>
    </linearGradient>
  </defs>
  <!-- Blacked-out theme: full-bleed near-black (maskable safe; iOS rounds it) -->
  <rect width="512" height="512" fill="#0a0a12"/>
  <!-- Happy face, filled with the Instagram rainbow -->
  <circle cx="256" cy="256" r="152" fill="url(#ig)"/>
  <!-- Eyes + smile knocked out in the black theme colour -->
  <circle cx="205" cy="228" r="23" fill="#0a0a12"/>
  <circle cx="307" cy="228" r="23" fill="#0a0a12"/>
  <path d="M 188 292 Q 256 366 324 292" fill="none" stroke="#0a0a12" stroke-width="26" stroke-linecap="round"/>
</svg>
